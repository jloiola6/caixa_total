services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-caixa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-caixa}
      POSTGRES_DB: ${POSTGRES_DB:-caixatotal}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-caixa} -d ${POSTGRES_DB:-caixatotal}"]
      interval: 5s
      timeout: 5s
      retries: 5

  back:
    build:
      context: ./back
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-caixa}:${POSTGRES_PASSWORD:-caixa}@postgres:5432/${POSTGRES_DB:-caixatotal}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: 4000
    ports:
      - "4000:4000"
    command: sh -c "npx prisma migrate deploy && node dist/index.js"

volumes:
  postgres_data:
